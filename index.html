<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nova AI | Advanced Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Fraunces:opsz,wght@9..144,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark-reasonable.min.css">

  <style>
    :root {
      --bg: #171717;
      --sidebar-bg: #111111;
      --surface: #212121;
      --surface-hover: #2a2a2a;
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #ececec;
      --text-dim: #9b9b9b;
      --accent: #d97757;
      --accent-soft: rgba(217, 119, 87, 0.1);
      --font-serif: "Fraunces", serif;
      --font-sans: "Inter", sans-serif;
      --ease: cubic-bezier(0.2, 0, 0, 1);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    [data-theme="light"] {
      --bg: #f9f9f9;
      --sidebar-bg: #f3f3f3;
      --surface: #ffffff;
      --surface-hover: #f0f0f0;
      --border: rgba(0, 0, 0, 0.08);
      --text-main: #1a1a1a;
      --text-dim: #6e6e6e;
      --accent: #d25f3c;
      --accent-soft: rgba(210, 95, 60, 0.05);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* Sidebar Logic */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform 0.3s var(--ease), width 0.3s var(--ease);
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }
    }

    .sb-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 18px;
      color: var(--accent);
    }

    .btn-new {
      margin: 10px 20px;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .btn-new:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.2s;
    }

    .chat-item:hover,
    .chat-item.active {
      background: var(--surface);
      color: var(--text-main);
    }

    .chat-item.active {
      border: 1px solid var(--border);
    }

    .chat-item .title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .btn-del {
      opacity: 0;
      transition: 0.2s;
    }

    .chat-item:hover .btn-del {
      opacity: 1;
      color: #ef4444;
    }

    /* Main Workspace */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-l,
    .nav-r {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: 0.2s;
      background: none;
      border: none;
    }

    .icon-btn:hover {
      background: var(--surface-hover);
      color: var(--text-main);
    }

    .model-select {
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .viewport {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 160px;
      position: relative;
    }

    .empty-state {
      display: none;
      align-items: center;
      justify-content: center;
      height: 50vh;
      font-size: 32px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .empty-state.active {
      display: flex;
    }

    .msg-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      animation: enter 0.3s forwards;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
    }

    .msg-row.assistant .avatar {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }

    .msg-row.user .avatar {
      background: var(--surface-hover);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .bubble {
      max-width: 85%;
    }

    .msg-row.user .bubble {
      background: var(--surface);
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
    }

    .msg-row.assistant .bubble {
      font-size: 16px;
      line-height: 1.7;
    }

    /* Markdown Styling */
    .bubble img {
      max-width: 100%;
      border-radius: 8px;
    }

    .bubble table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
    }

    .bubble th,
    .bubble td {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: left;
    }

    .bubble pre {
      background: #000 !important;
      border-radius: 10px;
      margin: 16px 0;
      position: relative;
    }

    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 10px 0;
      color: var(--text-dim);
    }

    /* Input Dock */
    .dock {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 20px 30px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      display: flex;
      justify-content: center;
    }

    .input-bar {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 12px 10px 20px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .input-bar textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 16px;
      padding: 10px 0;
      resize: none;
      min-height: 24px;
      max-height: 200px;
    }

    .btn-submit {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-submit:disabled {
      opacity: 0.3;
      filter: grayscale(1);
      cursor: default;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 900;
    }

    .overlay.active {
      display: block;
    }

    /* Loading Cursor */
    .cursor-blink {
      display: inline-block;
      width: 8px;
      height: 1.2em;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
            </polygon>
          </svg>
          <span>Nova Studio</span>
        </div>
        <button class="icon-btn" id="btnSideClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg></button>
      </div>
      <button class="btn-new" id="btnNew">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14" />
        </svg>
        New Protocol
      </button>
      <div class="chat-list" id="chatList"></div>
      <div style="padding: 20px; font-size: 10px; color: var(--text-dim); text-align: center;">Production v6.5 •
        Cognitive Tier</div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="header">
        <div class="nav-l">
          <button class="icon-btn" id="btnMenu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg></button>
          <select class="model-select" id="modelSelect">
            <option value="Qwen/Qwen2.5-7B-Instruct">Qwen 2.5 7B (Free Tier)</option>
            <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B (Free Tier)</option>
            <option value="HuggingFaceH4/zephyr-7b-beta">Zephyr 7B (Free Tier)</option>
            <option value="microsoft/Phi-3-mini-4k-instruct">Phi-3 Mini (Free Tier)</option>
          </select>
        </div>
        <div class="nav-r">
          <button class="icon-btn" id="btnTheme"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg></button>
          <div class="avatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg></div>
        </div>
      </header>

      <div class="viewport" id="viewport">
        <div class="chat-container">
          <div id="emptyState" class="empty-state">What can I help with?</div>
          <div id="feed"></div>
        </div>
      </div>

      <footer class="dock">
        <div class="input-bar">
          <textarea id="prompt" placeholder="Ask Nova anything..." rows="1"></textarea>
          <button class="btn-submit" id="btnSubmit" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
            </svg>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    (function () {
      const $ = id => document.getElementById(id);
      const STORAGE = 'nova_studio_v2';

      let state = {
        chats: JSON.parse(localStorage.getItem(STORAGE) || '{}'),
        activeId: localStorage.getItem(STORAGE + '_active') || null,
        theme: localStorage.getItem(STORAGE + '_theme') || 'dark',
        model: localStorage.getItem(STORAGE + '_model') || 'Qwen/Qwen2.5-7B-Instruct',
        busy: false
      };

      // Setup marked
      marked.options({ gfm: true, breaks: true, highlight: (code) => hljs.highlightAuto(code).value });

      function save() {
        localStorage.setItem(STORAGE, JSON.stringify(state.chats));
        localStorage.setItem(STORAGE + '_active', state.activeId);
        localStorage.setItem(STORAGE + '_theme', state.theme);
        localStorage.setItem(STORAGE + '_model', state.model);
      }

      function applyTheme(t) {
        state.theme = t;
        document.documentElement.setAttribute('data-theme', t);
        $('btnTheme').innerHTML = t === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        save();
      }

      function renderSidebar() {
        const list = $('chatList');
        list.innerHTML = '';
        const sorted = Object.values(state.chats).sort((a, b) => b.ts - a.ts);

        sorted.forEach(c => {
          const item = document.createElement('div');
          item.className = `chat-item ${state.activeId === c.id ? 'active' : ''}`;
          item.innerHTML = `
                        <div class="title">${c.title || 'New Protocol'}</div>
                        <button class="btn-del icon-btn" style="width:24px;height:24px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                    `;
          item.onclick = () => loadChat(c.id);
          item.querySelector('.btn-del').onclick = (e) => { e.stopPropagation(); deleteChat(c.id); };
          list.appendChild(item);
        });
      }

      function updateEmptyState() {
        const feed = $('feed');
        const emptyState = $('emptyState');
        if (feed.children.length === 0) {
          emptyState.classList.add('active');
        } else {
          emptyState.classList.remove('active');
        }
      }

      function loadChat(id) {
        state.activeId = id;
        const chat = state.chats[id];
        const feed = $('feed');
        feed.innerHTML = '';
        chat.messages.forEach(m => appendRow(m.role, m.content));
        renderSidebar();
        save();
        updateEmptyState();
        if (window.innerWidth <= 900) toggleSidebar(false);
      }

      function appendRow(role, content, stream = false) {
        const feed = $('feed');
        let row = feed.lastElementChild;

        if (row && !row.classList.contains(role)) {
          row = null;
        } else if (role === 'assistant' && row && !row.classList.contains('streaming')) {
          row = null;
        }

        if (!row) {
          row = document.createElement('div');
          row.className = `msg-row ${role}`;

          const userIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
          const aiIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>`;

          row.innerHTML = `
                        <div class="avatar">${role === 'user' ? userIcon : aiIcon}</div>
                        <div class="bubble">
                            <div class="bubble-content"></div>
                        </div>
                    `;
          if (role === 'user') row.innerHTML = `<div class="bubble"><div class="bubble-content"></div></div><div class="avatar">${userIcon}</div>`;
          feed.appendChild(row);
        }

        if (stream) {
          row.classList.add('streaming');
        } else {
          row.classList.remove('streaming');
        }

        const target = row.querySelector('.bubble-content');
        if (role === 'user') {
          target.textContent = content;
        } else {
          target.innerHTML = marked.parse(content + (stream ? '<span class="cursor-blink"></span>' : ''));
          if (!stream) target.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
        }

        $('viewport').scrollTo({ top: $('viewport').scrollHeight, behavior: 'auto' });
        updateEmptyState();
      }

      async function submit() {
        const txt = $('prompt').value.trim();
        if (!txt || state.busy) return;

        if (!state.activeId || !state.chats[state.activeId]) {
          const id = 'chat_' + Date.now();
          state.chats[id] = { id, title: txt.substring(0, 30), messages: [], ts: Date.now() };
          state.activeId = id;
        }

        const chat = state.chats[state.activeId];
        chat.messages.push({ role: 'user', content: txt });
        appendRow('user', txt);

        $('prompt').value = '';
        $('prompt').style.height = 'auto';
        state.busy = true;
        $('btnSubmit').disabled = true;

        let assistantMsg = { role: 'assistant', content: '' };
        chat.messages.push(assistantMsg);
        appendRow('assistant', '', true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: chat.messages.slice(0, -1), // Send history except the empty assistant msg
              model: state.model,
              stream: true
            })
          });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'System link failed');
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            // Parse HF Router stream chunks (SSE format)
            const lines = chunk.split('\n');
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                if (line.includes('[DONE]')) break;
                try {
                  const json = JSON.parse(line.substring(6));
                  const content = json.choices?.[0]?.delta?.content || '';
                  fullText += content;
                  assistantMsg.content = fullText;
                  appendRow('assistant', fullText, true);
                } catch (e) { }
              }
            }
          }

          // Final render to remove cursor and highlight code
          appendRow('assistant', fullText, false);
          chat.ts = Date.now();
          save();
        } catch (e) {
          assistantMsg.content = `Error: ${e.message}`;
          appendRow('assistant', assistantMsg.content, false);
        } finally {
          state.busy = false;
          $('btnSubmit').disabled = false;
          renderSidebar();
        }
      }

      function deleteChat(id) {
        delete state.chats[id];
        if (state.activeId === id) {
          state.activeId = null;
          $('feed').innerHTML = '';
          updateEmptyState();
        }
        save(); renderSidebar();
      }

      function toggleSidebar(show) {
        $('sidebar').classList.toggle('open', show);
        $('overlay').classList.toggle('active', show);
      }

      $('btnMenu').onclick = () => toggleSidebar(true);
      $('btnSideClose').onclick = () => toggleSidebar(false);
      $('overlay').onclick = () => toggleSidebar(false);

      $('btnNew').onclick = () => {
        state.activeId = null;
        $('feed').innerHTML = '';
        renderSidebar();
        updateEmptyState();
        if (window.innerWidth <= 900) toggleSidebar(false);
        $('prompt').focus();
      };

      $('btnTheme').onclick = () => applyTheme(state.theme === 'dark' ? 'light' : 'dark');

      $('modelSelect').onchange = (e) => {
        state.model = e.target.value;
        save();
      };

      $('prompt').oninput = () => {
        $('prompt').style.height = 'auto';
        $('prompt').style.height = $('prompt').scrollHeight + 'px';
        $('btnSubmit').disabled = !$('prompt').value.trim() || state.busy;
      };

      $('prompt').onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 900) {
          e.preventDefault(); submit();
        }
      };

      $('btnSubmit').onclick = submit;

      // Init
      applyTheme(state.theme);
      $('modelSelect').value = state.model;
      if (state.activeId && state.chats[state.activeId]) loadChat(state.activeId);
      else {
        renderSidebar();
        updateEmptyState();
      }

    })();
  </script>
</body>

</html>
