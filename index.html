<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nova AI | 2026 Production</title>
  <meta name="description" content="Next-gen AI interface with cognitive synchronization capabilities." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

  <style>
    /* 
       Architecture: Tokenized Theming (v5.0)
       Compatibility: Android, iOS, Modern Web
    */

    :root {
      --sb-w: 280px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);

      /* Theme Variables (Initial Dark) */
      --bg: #050505;
      --surface: #0e0e11;
      --surface-elevated: #16161a;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1aa;
      --accent: #8b5cf6;
      --accent-grad: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
      --radius-lg: 24px;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(20, 20, 22, 0.9);
      --glass: blur(20px) saturate(160%);
    }

    /* Target the html element via data-theme */
    html[data-theme="light"] {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-elevated: #fcfcfd;
      --border: rgba(0, 0, 0, 0.08);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #8b5cf6;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      --input-bg: rgba(255, 255, 255, 0.9);
    }

    /* Core Layout */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
    }

    .app {
      display: flex;
      height: 100%;
      position: relative;
    }

    /* Sidebar - Desktop Margin, Mobile Fixed Overlay */
    .sidebar {
      width: var(--sb-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1500;
      transition: transform 0.4s var(--ease), margin-left 0.4s var(--ease);
    }

    @media (max-width: 1024px) {
      .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 20px 0 60px rgba(0, 0, 0, 0.4);
      }

      .sidebar.open {
        transform: translateX(0);
      }
    }

    .sb-inner {
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo-box {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--accent-grad);
      display: grid;
      place-items: center;
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
    }

    .logo-box svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .brand span {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
    }

    .btn-new {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-new:hover {
      background: var(--border);
      transform: translateY(-1px);
    }

    .history {
      flex: 1;
      overflow-y: auto;
      margin-top: 30px;
    }

    .hist-item {
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .hist-item:hover {
      background: var(--border);
    }

    .hist-item.active {
      background: hsla(263, 90%, 65%, 0.1);
      border-color: hsla(263, 90%, 65%, 0.2);
      color: var(--text-primary);
      font-weight: 600;
    }

    /* Main Area - Flex Vertical Stack (NO ABSOLUTE OVERLAP) */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Navigation Bar */
    .nav {
      height: 72px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg);
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    /* Scroll Area */
    .viewport {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    .content-wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* Welcome Hero */
    .hero {
      text-align: center;
      padding: 10vh 0 40px;
    }

    .hero span {
      font-size: 50px;
      margin-bottom: 24px;
      display: block;
      filter: drop-shadow(0 0 20px hsla(263, 90%, 65%, 0.4));
    }

    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(32px, 8vw, 54px);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: clamp(16px, 2vw, 19px);
      max-width: 500px;
      margin: 0 auto 50px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius-lg);
      text-align: left;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .card b {
      display: block;
      font-size: 15px;
      color: var(--text-secondary);
    }

    .card:hover b {
      color: var(--text-primary);
    }

    /* Bubbles */
    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    .row.user {
      flex-direction: row-reverse;
    }

    .av {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .row.assistant .av {
      background: var(--accent-grad);
      color: #fff;
      border: none;
    }

    .bubble {
      max-width: 85%;
    }

    .row.user .bubble {
      background: var(--msg-user-bg);
      color: #fff;
      padding: 14px 20px;
      border-radius: 20px 20px 4px 20px;
      font-weight: 500;
      font-size: 15.5px;
    }

    .row.assistant .bubble {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    pre {
      background: #000;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin: 20px 0;
      overflow-x: auto;
    }

    code {
      font-family: 'SF Mono', monospace;
      padding: 20px;
      display: block;
      font-size: 14px;
    }

    /* Input Dock - Now a flex sibling (guaranteed no overlap) */
    .dock {
      padding: 20px 20px 40px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input {
      width: 100%;
      max-width: 840px;
      margin: 0 auto;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 14px 10px 24px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .input:focus-within {
      border-color: var(--accent);
    }

    .input textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 16px;
      padding: 12px 0;
      resize: none;
      min-height: 24px;
      max-height: 200px;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--accent-grad);
      border: none;
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s;
    }

    .send-btn:disabled {
      opacity: 0.3;
      filter: grayscale(1);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1400;
    }

    .overlay.visible {
      display: block;
    }

    /* Extra Theme Toggle UI */
    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--text-primary);
    }

    @media (max-width: 1024px) {
      .nav {
        padding: 0 12px;
        height: 64px;
      }

      .dock {
        padding: 12px 12px calc(24px + env(safe-area-inset-bottom));
      }

      .badge span:last-child {
        display: none;
      }

      .desktop-only {
        display: none !important;
      }
    }
  </style>
</head>

<body data-theme="dark">
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="sb-inner">
        <div class="brand">
          <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" />
            </svg>
          </div>
          <span>Nova AI</span>
        </div>
        <button class="btn-new" id="btnNew">New Protocol</button>
        <div class="history" id="chatList"></div>
        <div style="font-size: 11px; opacity: 0.5; text-align: center; padding-top: 20px;">V5.0.1 ALPHA</div>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="nav">
        <div class="nav-left">
          <button class="menu-btn" id="btnMenu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M4 12h16M4 6h16M4 18h16" />
            </svg></button>
          <div class="badge">
            <div class="dot"></div><span>Meta Llama 3.1 8B</span>
          </div>
        </div>
        <div class="nav-right">
          <button class="theme-btn" id="btnTheme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3">
              <path
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
            </svg></button>
          <button class="menu-btn desktop-only"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
            </svg></button>
        </div>
      </header>

      <div class="viewport" id="scroll">
        <div class="content-wrap">
          <div class="hero" id="welcome">
            <span>🌌</span>
            <h1>Cognitive Space</h1>
            <p>Deploy advanced logic and synthesis layers. Performance optimized for production.</p>
            <div class="grid">
              <div class="card chip" data-prompt="Synthesize quantum computing principles">
                <b>Synthesize Quantum Principles</b>
              </div>
              <div class="card chip" data-prompt="Architect a real-time analytics system">
                <b>Architect Analytics System</b>
              </div>
            </div>
          </div>
          <div id="msgs"></div>
        </div>
      </div>

      <footer class="dock">
        <div class="input">
          <textarea id="inputText" placeholder="Communicate with Nova..." rows="1"></textarea>
          <button class="send-btn" id="btnSend" disabled><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
            </svg></button>
        </div>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    (function () {
      const KEY = 'nova_v5';
      const $ = i => document.getElementById(i);

      let state = {
        theme: localStorage.getItem(KEY + '_th') || 'dark',
        chats: JSON.parse(localStorage.getItem(KEY) || '{}'),
        curr: localStorage.getItem(KEY + '_c'),
        busy: false
      };

      function save() {
        localStorage.setItem(KEY, JSON.stringify(state.chats));
        localStorage.setItem(KEY + '_th', state.theme);
        localStorage.setItem(KEY + '_c', state.curr);
      }

      function applyTheme(t) {
        state.theme = t;
        document.documentElement.setAttribute('data-theme', t);
        save();
      }

      function scroll() { $('scroll').scrollTo({ top: $('scroll').scrollHeight, behavior: 'smooth' }); }

      function showToast(m) {
        const t = document.createElement('div');
        t.className = 'toast show';
        t.textContent = m;
        document.body.appendChild(t);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2500);
      }

      function renderMarkdown(raw) {
        const temp = document.createElement('div');
        temp.innerHTML = marked.parse(raw);
        temp.querySelectorAll('pre').forEach(pre => {
          const code = pre.querySelector('code');
          const btn = document.createElement('button');
          btn.className = 'nav-btn';
          btn.style.position = 'absolute'; btn.style.top = '10px'; btn.style.right = '10px';
          btn.style.width = 'auto'; btn.style.height = '30px'; btn.style.padding = '0 10px';
          btn.style.fontSize = '10px'; btn.textContent = 'Copy';
          pre.style.position = 'relative';
          pre.appendChild(btn);
          btn.onclick = () => {
            navigator.clipboard.writeText(code.textContent);
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
          };
          if (code) hljs.highlightElement(code);
        });
        return temp.innerHTML;
      }

      function renderList() {
        const sorted = Object.values(state.chats).sort((a, b) => b.ts - a.ts);
        $('chatList').innerHTML = sorted.map(c => `
          <div class="hist-item ${state.curr === c.id ? 'active' : ''}" onclick="window._n.l('${c.id}')">
            ${c.title || 'Session'}
          </div>
        `).join('');
      }

      function appendRow(m) {
        const row = document.createElement('div');
        row.className = 'row ' + m.role;
        const av = `<div class="av">${m.role === 'user' ? 'HU' : 'AI'}</div>`;
        const bub = `<div class="bubble">${m.role === 'user' ? m.content : renderMarkdown(m.content)}</div>`;
        row.innerHTML = m.role === 'user' ? bub + av : av + bub;
        $('msgs').appendChild(row);
      }

      window._n = {
        l: (id) => {
          state.curr = id;
          const chat = state.chats[id];
          $('msgs').innerHTML = '';
          $('welcome').style.display = chat.messages.length ? 'none' : 'block';
          chat.messages.forEach(appendRow);
          renderList(); save();
          if (window.innerWidth <= 1024) { $('sidebar').classList.remove('open'); $('overlay').classList.remove('visible'); }
          scroll();
        }
      };

      async function send(txt) {
        if (!state.curr || !state.chats[state.curr]) {
          const id = 'c' + Date.now();
          state.chats[id] = { id, title: txt.slice(0, 24), messages: [], ts: Date.now() };
          state.curr = id;
        }
        const chat = state.chats[state.curr];
        const m = { role: 'user', content: txt };
        chat.messages.push(m);
        appendRow(m);
        $('welcome').style.display = 'none';
        $('inputText').value = '';
        $('inputText').style.height = 'auto';
        scroll();

        state.busy = true;
        $('btnSend').disabled = true;

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ inputs: chat.messages.map(x => `<|${x.role}|>\n${x.content}\n`).join('') + '<|assistant|>\n' })
          });
          const d = await res.json();
          let msg = Array.isArray(d) ? d[0].generated_text : (d.generated_text || '');
          msg = msg.replace(/<\|user\|>[\s\S]*/g, '').replace(/<\|assistant\|>/g, '').replace(/<\|end\|>/g, '').trim();
          const am = { role: 'assistant', content: msg || 'Connection interrupted.' };
          chat.messages.push(am);
          appendRow(am);
        } catch (e) { }

        state.busy = false;
        $('btnSend').disabled = false;
        save(); renderList(); scroll();
      }

      $('btnMenu').onclick = () => {
        if (window.innerWidth <= 1024) { $('sidebar').classList.add('open'); $('overlay').classList.add('visible'); }
        else { $('sidebar').classList.toggle('hidden'); }
      };

      $('overlay').onclick = () => { $('sidebar').classList.remove('open'); $('overlay').classList.remove('visible'); };
      $('btnNew').onclick = () => { const id = 'c' + Date.now(); state.chats[id] = { id, title: 'Session', messages: [], ts: Date.now() }; window._n.l(id); };
      $('btnTheme').onclick = () => applyTheme(state.theme === 'dark' ? 'light' : 'dark');

      $('inputText').oninput = () => {
        $('btnSend').disabled = !$('inputText').value.trim() || state.busy;
        $('inputText').style.height = 'auto';
        $('inputText').style.height = $('inputText').scrollHeight + 'px';
      };

      $('btnSend').onclick = () => send($('inputText').value.trim());

      document.querySelectorAll('.chip').forEach(c => {
        c.onclick = () => send(c.dataset.prompt);
      });

      applyTheme(state.theme);
      if (state.curr && state.chats[state.curr]) window._n.l(state.curr);
      else renderList();
    })();
  </script>
</body>

</html>
