<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nova AI | Advanced Intelligence</title>

  <!-- SEO -->
  <meta name="description" content="Nova AI: A professional-grade, low-latency AI collaborator.">

  <!-- Fonts: Inter for UI, Fraunces for sophisticated serif headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark-reasonable.min.css">

  <style>
    :root {
      /* Sophisticated Tone Palette (Dark Mode - Primary) */
      --bg: #171717;
      --sidebar-bg: #111111;
      --surface: #212121;
      --surface-hover: #2a2a2a;
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #ececec;
      --text-dim: #9b9b9b;
      --accent: #d97757;
      /* Claude-inspired Coral */
      --accent-soft: rgba(217, 119, 87, 0.1);

      --radius-main: 20px;
      --radius-sm: 12px;
      --font-serif: "Fraunces", serif;
      --font-sans: "Inter", system-ui, sans-serif;

      --ease: cubic-bezier(0.2, 0, 0, 1);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    [data-theme="light"] {
      --bg: #f9f9f9;
      --sidebar-bg: #f3f3f3;
      --surface: #ffffff;
      --surface-hover: #f0f0f0;
      --border: rgba(0, 0, 0, 0.08);
      --text-main: #1a1a1a;
      --text-dim: #6e6e6e;
      --accent: #d25f3c;
      --accent-soft: rgba(210, 95, 60, 0.05);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* Sidebar - Slim Icon Style */
    .sidebar {
      width: 72px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      z-index: 100;
      transition: width 0.3s var(--ease);
      overflow: hidden;
    }

    .sidebar:hover {
      width: 260px;
    }

    .side-item {
      width: 48px;
      min-width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .side-item:hover {
      background: var(--surface-hover);
      color: var(--text-main);
    }

    .side-item span {
      margin-left: 20px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .sidebar:hover .side-item {
      width: 220px;
      justify-content: flex-start;
      padding: 0 16px;
    }

    .sidebar:hover .side-item span {
      opacity: 1;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--accent);
      display: grid;
      place-items: center;
      margin-bottom: 30px;
    }

    .logo-box svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    /* Main Workspace */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
    }

    .model-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 100px;
      transition: 0.2s;
    }

    .model-selector:hover {
      background: var(--surface-hover);
    }

    .model-selector span {
      font-weight: 600;
      font-size: 14px;
    }

    .model-selector svg {
      color: var(--text-dim);
    }

    .viewport {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding-bottom: 120px;
    }

    .chat-content {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 24px;
    }

    /* Welcome Section */
    .welcome {
      text-align: center;
      padding: 10vh 0;
      display: block;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
    }

    .welcome h1 {
      font-family: var(--font-serif);
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    /* Message Bubble Design */
    .msg-row {
      display: flex;
      gap: 20px;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.4s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    .msg-row.assistant .avatar {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .msg-row.user .avatar {
      background: var(--surface);
      color: var(--text-dim);
    }

    .bubble {
      max-width: 85%;
    }

    .bubble-content {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-main);
    }

    .msg-row.user .bubble-content {
      background: var(--surface);
      padding: 12px 20px;
      border-radius: 18px;
      display: inline-block;
    }

    .msg-row.assistant .bubble-content h2,
    .msg-row.assistant .bubble-content h3 {
      font-family: var(--font-serif);
      font-weight: 500;
      margin: 1em 0 0.5em;
    }

    /* Action Bar for Assistant */
    .msg-actions {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      opacity: 0;
      transition: 0.3s;
    }

    .msg-row.assistant:hover .msg-actions {
      opacity: 1;
    }

    .action-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .action-icon:hover {
      background: var(--surface-hover);
      color: var(--text-main);
    }

    /* Input Station */
    .dock {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 24px 30px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      display: flex;
      justify-content: center;
    }

    .prompt-box {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 12px 12px 20px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: border 0.2s, box-shadow 0.2s;
    }

    .prompt-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .prompt-box textarea {
      flex: 1;
      min-height: 24px;
      max-height: 250px;
      background: none;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 16px;
      padding: 10px 0;
      resize: none;
    }

    .dock-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .dock-btn:hover {
      background: var(--surface-hover);
      color: var(--text-main);
    }

    .btn-submit {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-submit:hover {
      background: #e08b70;
      transform: scale(1.05);
    }

    .btn-submit:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      filter: grayscale(1);
      transform: none;
    }

    /* Mobile Adjustments */
    @media (max-width: 800px) {
      .sidebar {
        display: none;
      }

      .chat-content {
        padding: 20px 16px;
      }

      .header {
        padding: 0 16px;
      }

      .dock {
        padding: 10px 16px 20px;
      }

      .prompt-box {
        border-radius: 30px;
        padding: 8px 8px 8px 20px;
      }

      .dock-btn {
        width: 40px;
        height: 40px;
      }
    }

    /* Markdown Overrides */
    pre {
      background: #121212 !important;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid var(--border);
      overflow-x: auto;
    }

    code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
      border-radius: 0;
      background: none !important;
    }

    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text-dim);
      font-style: italic;
    }
  </style>
</head>

<body data-theme="dark">
  <div class="app-container">

    <!-- Sidebar Shell -->
    <aside class="sidebar">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" />
        </svg>
      </div>
      <div class="side-item active" title="New Chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14" />
        </svg>
        <span>New Protocol</span>
      </div>
      <div class="side-item" title="History">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Recent Layers</span>
      </div>
      <div style="flex:1"></div>
      <div class="side-item" id="btnTheme" title="Toggle Theme">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
        </svg>
        <span>Switch Ambience</span>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="model-selector">
          <span>Nova 3.1 8B</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </div>
        <div class="header-right">
          <div class="avatar" style="background:var(--surface); cursor:pointer">H</div>
        </div>
      </header>

      <div class="viewport" id="scrollContainer">
        <div class="chat-content">

          <!-- Centered Welcome -->
          <section class="welcome" id="welcomeScreen">
            <div class="welcome-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z" />
              </svg>
            </div>
            <h1 id="greeting">Loading intelligence...</h1>
            <p style="color:var(--text-dim); max-width:400px; margin: 0 auto;">Ask anything, from code architecture to
              creative synthesis.</p>
          </section>

          <div id="messageFeed"></div>
        </div>
      </div>

      <footer class="dock">
        <div class="prompt-box">
          <div class="dock-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="3">
              <path d="M12 5v14M5 12h14" />
            </svg></div>
          <textarea id="promptInput" placeholder="Reply to Nova..." rows="1"></textarea>
          <div class="dock-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <path
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg></div>
          <button class="dock-btn btn-submit" id="btnSubmit" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    (function () {
      const $ = id => document.getElementById(id);
      const STORAGE_KEY = 'nova_identity_v6';

      let state = {
        theme: localStorage.getItem('nova_theme') || 'dark',
        messages: [],
        busy: false
      };

      // Initial Theme
      document.body.parentElement.setAttribute('data-theme', state.theme);

      function updateGreeting() {
        const hour = new Date().getHours();
        const greeting = $('greeting');
        if (hour < 12) greeting.textContent = "How can I help you this morning?";
        else if (hour < 18) greeting.textContent = "How can I help you this afternoon?";
        else greeting.textContent = "How can I help you this evening?";
      }
      updateGreeting();

      function appendMessage(role, content) {
        const feed = $('messageFeed');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const avatar = `<div class="avatar">${role === 'user' ? 'HU' : 'AI'}</div>`;

        let actions = role === 'assistant' ? `
                    <div class="msg-actions">
                        <div class="action-icon" title="Copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></div>
                        <div class="action-icon" title="Share"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
                        <div class="action-icon" title="Retry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></div>
                    </div>
                ` : '';

        const rendered = role === 'user' ? content : marked.parse(content);
        const bubble = `
                    <div class="bubble">
                        <div class="bubble-content">${rendered}</div>
                        ${actions}
                    </div>
                `;

        row.innerHTML = role === 'user' ? bubble + avatar : avatar + bubble;
        feed.appendChild(row);

        if (role === 'assistant') {
          row.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        }

        scroll();
      }

      function scroll() {
        $('scrollContainer').scrollTo({ top: $('scrollContainer').scrollHeight, behavior: 'smooth' });
      }

      async function submit() {
        const txt = $('promptInput').value.trim();
        if (!txt || state.busy) return;

        $('welcomeScreen').style.display = 'none';
        $('promptInput').value = '';
        $('promptInput').style.height = 'auto';

        appendMessage('user', txt);
        state.messages.push({ role: 'user', content: txt });

        state.busy = true;
        $('btnSubmit').disabled = true;

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ inputs: state.messages.map(m => `<|${m.role}|>\n${m.content}\n`).join('') + '<|assistant|>\n' })
          });
          const data = await res.json();
          let reply = Array.isArray(data) ? data[0].generated_text : (data.generated_text || '');
          reply = reply.replace(/<\|user\|>[\s\S]*/g, '').replace(/<\|assistant\|>/g, '').replace(/<\|end\|>/g, '').trim();

          state.messages.push({ role: 'assistant', content: reply });
          appendMessage('assistant', reply);
        } catch (e) {
          appendMessage('assistant', "System error: Cognitive link failed.");
        } finally {
          state.busy = false;
          $('btnSubmit').disabled = false;
        }
      }

      // Events
      $('promptInput').oninput = () => {
        const el = $('promptInput');
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
        $('btnSubmit').disabled = !el.value.trim() || state.busy;
      };

      $('promptInput').onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 800) {
          e.preventDefault(); submit();
        }
      };

      $('btnSubmit').onclick = submit;

      $('btnTheme').onclick = () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        document.body.parentElement.setAttribute('data-theme', state.theme);
        localStorage.setItem('nova_theme', state.theme);
      };

      // Custom Copy functionality
      document.addEventListener('click', (e) => {
        const icon = e.target.closest('.action-icon');
        if (!icon) return;
        if (icon.title === 'Copy') {
          const content = icon.closest('.bubble').querySelector('.bubble-content').textContent;
          navigator.clipboard.writeText(content);
          const original = icon.innerHTML;
          icon.innerHTML = '✓';
          setTimeout(() => icon.innerHTML = original, 2000);
        }
      });

    })();
  </script>
</body>

</html>
